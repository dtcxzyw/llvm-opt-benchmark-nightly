name: Sync with upstream LLVM

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */1 * * *"

jobs:
  build:
    runs-on: [self-hosted, baseline]

    permissions:
      issues: write
      contents: write

    steps:
      - name: Reset repository
        run: git clean -ffdx -- report && git reset --hard HEAD

      - uses: actions/checkout@v4
        with:
          submodules: false
          ref: main
          clean: false

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up python env
        run: uv sync

      - name: Update LLVM
        id: update
        run: uv run scripts/ci.py update
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          HF_TOKEN: ${{ secrets.HF_TOKEN_WRITE }}
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Upload IR diff artifacts
        if: steps.update.outputs.SHOULD_UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sync-ir-diffs-${{ github.run_id }}
          path: ${{ steps.update.outputs.ARTIFACT_DIR }}
